version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: simpel_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: simpel_alkhairaat
      MYSQL_USER: simpel_user
      MYSQL_PASSWORD: simpel_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - simpel_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simpel_backend
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: simpel_user
      DB_PASSWORD: simpel_password
      DB_NAME: simpel_alkhairaat
      JWT_SECRET: your_jwt_secret_key_here
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - mysql
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - simpel_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: simpel_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - simpel_network

volumes:
  mysql_data:

networks:
  simpel_network:
    driver: bridge